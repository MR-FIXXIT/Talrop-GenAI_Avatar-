apiVersion: apps/v1
kind: Deployment
metadata:
  name: avatar-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: avatar-api
  template:
    metadata:
      labels:
        app: avatar-api
    spec:
      containers:
        - name: api
          image: avatar-api:latest
          ports:
            - containerPort: 8000
