version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: deployment/docker/api.Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
      - ./avatar/lora:/app/avatar/lora

  worker:
    build:
      context: .
      dockerfile: deployment/docker/worker.Dockerfile
    depends_on:
      - redis
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage

  gpu-worker:
    build:
      context: .
      dockerfile: deployment/docker/gpu.Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [ gpu ]
    depends_on:
      - redis
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
      - ./avatar/lora:/app/avatar/lora

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: avatar
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./deployment/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api
